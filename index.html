<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iridio — AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --surface: #0d1117;
    --surface2: #111820;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.25);
    --accent: #63b3ed;
    --accent2: #90cdf4;
    --text: #e8f0f8;
    --text-muted: #7a9bbf;
    --text-dim: #4a6a8a;
    --user-bg: rgba(99,179,237,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  .login-box {
    width: 100%;
    max-width: 360px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .login-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border2);
  }

  .login-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
  }

  .login-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-align: center;
    margin-top: -16px;
  }

  .login-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { letter-spacing: 0; color: var(--text-dim); }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #080b10;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .login-btn:hover { background: var(--accent2); }
  .login-btn:active { transform: scale(0.98); }

  .login-error {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #fc8181;
    text-align: center;
    min-height: 16px;
  }

  /* ── CHAT ── */
  #chat-screen { display: none; flex-direction: column; height: 100%; }
  #chat-screen.active { display: flex; }

  header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
  }

  .avatar-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }

  .avatar-wrap img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border2);
    display: block;
  }

  .avatar-online {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #68d391;
    border: 2px solid var(--surface2);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .header-desc { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 1px; }
  .header-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 100px; }

  .messages {
    position: relative; z-index: 1;
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 75%; animation: fadeUp 0.25s ease; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; overflow: hidden; }
  .msg.bot .msg-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg.user .msg-avatar { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text-muted); }

  .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
  .msg.bot .msg-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--user-bg); border: 1px solid var(--border2); color: var(--text); border-top-right-radius: 4px; }
  .msg-bubble.error { color: #fc8181; border-color: rgba(252,129,129,0.2); background: rgba(252,129,129,0.04); }

  .typing-row { display: none; align-items: center; gap: 10px; animation: fadeUp 0.25s ease; }
  .typing-row.active { display: flex; }
  .typing-av { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
  .typing-av img { width: 100%; height: 100%; object-fit: cover; }
  .typing-bubble { display: flex; gap: 4px; align-items: center; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; border-top-left-radius: 4px; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.35; } 30% { transform: translateY(-5px); opacity: 1; } }

  .input-bar { position: relative; z-index: 1; display: flex; align-items: flex-end; gap: 8px; padding: 12px 24px 14px; border-top: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }

  .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; min-height: 42px; max-height: 110px; line-height: 1.5; }
  .chat-input::placeholder { color: var(--text-dim); }
  .chat-input:focus { border-color: var(--border2); }

  .send-btn { width: 42px; height: 42px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; color: #080b10; }
  .send-btn:hover { background: var(--accent2); transform: scale(1.04); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 17px; height: 17px; }

  .notice { position: relative; z-index: 1; text-align: center; padding: 6px 24px 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.3px; background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0; }

  @media (max-width: 600px) {
    header, .input-bar { padding: 12px 16px; }
    .messages { padding: 16px; }
    .msg { max-width: 88%; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img class="login-avatar" src="iridio_avatar.png" alt="Iridio">
    <div>
      <div class="login-title">Iridio</div>
      <div class="login-sub">AI PERSONAL AGENT</div>
    </div>
    <input class="login-input" type="password" id="pwd-input" placeholder="Password di accesso" />
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">Accedi</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <header>
    <div class="avatar-wrap">
      <img src="iridio_avatar.png" alt="Iridio">
      <div class="avatar-online"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Iridio</div>
      <div class="header-desc">AI PERSONAL AGENT</div>
    </div>
    <div class="header-badge">beta</div>
  </header>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar"><img src="iridio_avatar.png" alt="Iridio"></div>
      <div class="msg-bubble">Ciao! Sono Iridio 👋 Posso rispondere a domande, fare ricerche sul web, o semplicemente fare due chiacchiere. Come posso aiutarti?</div>
    </div>
  </div>

  <div class="typing-row" id="typing-row">
    <div class="typing-av"><img src="iridio_avatar.png" alt=""></div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="input-bar">
    <textarea class="chat-input" id="input" placeholder="Scrivi un messaggio..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="notice">versione privata · max 10 messaggi ogni 10 minuti · sperimentale</div>
</div>

<script>
  const API_URL = 'https://iridio.mooo.com/api/chat';

  let password = '';
  let history  = [];

  const pwdInput   = document.getElementById('pwd-input');
  const loginError = document.getElementById('login-error');
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const typingRow  = document.getElementById('typing-row');

  pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const pwd = pwdInput.value.trim();
    if (!pwd) return;
    loginError.textContent = '';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: 'ciao' }], password: pwd })
      });

      if (res.status === 401) { loginError.textContent = 'Password errata.'; return; }

      password = pwd;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').classList.add('active');
      inputEl.focus();
    } catch(e) {
      loginError.textContent = 'Errore di connessione.';
    }
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
  });

  function addMsg(role, text, error = false) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    if (role === 'bot') av.innerHTML = '<img src="iridio_avatar.png" alt="Iridio">';
    else { av.textContent = 'tu'; }
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (error ? ' error' : '');
    bubble.textContent = text;
    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setTyping(on) {
    typingRow.classList.toggle('active', on);
    if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    setTyping(true);
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, password })
      });
      if (res.status === 429) {
        setTyping(false);
        addMsg('bot', 'Hai raggiunto il limite di messaggi. Aspetta qualche minuto.', true);
        history.pop();
      } else if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      } else {
        const { reply } = await res.json();
        setTyping(false);
        addMsg('bot', reply || 'Nessuna risposta.');
        history.push({ role: 'assistant', content: reply });
      }
    } catch(e) {
      setTyping(false);
      addMsg('bot', 'Problema di connessione. Riprova tra qualche secondo.', true);
      history.pop();
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
